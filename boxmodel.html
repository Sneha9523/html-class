<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        } 
        .box{
            width: 400px;
            height: 400px;
            background-color: aquamarine;
            margin: 10px;
            padding: 5px;
            border: 2px solid rgb(113, 113, 238)

        }
         .box:hover{
            background-color: bisque;
            border: 5px, slategrey;
            cursor: pointer;
            transition: 3s ease-in-out;
         }
    </style>
</head>
<body>
    <div class="box"> 
        Hello,this is Sneha from CCT.
        <h1>my sister is very beautiful and her name is sanu maya</h1>
    </div>
    
</body>
</html>
