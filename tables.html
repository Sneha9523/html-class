<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> table and nested table</title>
</head>
<body>
    <h2> Row Span and Col Span:</h2>
    <table border="1">
        <tr>
            <td colspan="2"> class routin
            </td>
        </tr>
        <tr>
            <th>day</th>
            <th>subject</th>
        </tr>
        <tr>
            <td> sunday</td>
            <td> statistics</td>
        </tr>
        <tr>
            <td> monday</td>
            <td> maths</td>
        </tr>
        <tr>
            <td> tuesday</td>
            <td rowspan="2"> microprocessor</td>
        </tr>
        <tr>
            <td> wednwsday</td>
        </tr>
    </table>
    
</body>
</html>
